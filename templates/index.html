<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别打卡系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { opacity: 0.9; }
        
        /* 摄像头区域 - 居中 */
        .camera-section {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .camera-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .camera-card h2 {
            margin-bottom: 15px;
            color: #333;
        }
        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        video, canvas { width: 100%; height: auto; display: block; }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .btn-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-warning { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-small {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-small:hover { background: #ff4757; }
        
        /* 记录区域 - 两个折叠面板 */
        .records-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .collapse-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .collapse-header {
            background: #f8f9fa;
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            transition: 0.2s;
        }
        .collapse-header:hover {
            background: #e9ecef;
        }
        .collapse-header .arrow {
            transition: transform 0.3s;
        }
        .collapse-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        .collapse-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 20px;
        }
        .collapse-content.open {
            max-height: 500px;
            padding: 20px;
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
        }
        .records-table th, .records-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .records-table th { background: #f8f9fa; }
        .scrollable { max-height: 350px; overflow-y: auto; }
        
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .result.success { background: #d4edda; color: #155724; }
        .result.error { background: #f8d7da; color: #721c24; }
        .result.info { background: #d1ecf1; color: #0c5460; }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 380px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        #registerPreview { margin-top: 10px; text-align: center; }
        #previewImg { max-width: 100%; border-radius: 10px; }
        
        /* 成功页面 */
        .success-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            animation: fadeIn 0.3s ease;
        }
        .success-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .success-card .check-icon {
            width: 70px;
            height: 70px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        .success-card .check-icon svg { width: 40px; height: 40px; fill: white; }
        .success-card h2 { font-size: 24px; margin-bottom: 10px; }
        .success-card p { font-size: 20px; font-weight: bold; color: #667eea; margin-bottom: 20px; }
        .success-card button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>人脸识别打卡系统</h1>
        <p>实时检测 | 一键打卡 | 语音反馈</p>
    </div>
    
    <!-- 摄像头区域 - 居中 -->
    <div class="camera-section">
        <div class="camera-card">
            <h2>📸 实时摄像头</h2>
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" onclick="takePhoto('check_in')">上班打卡</button>
                <button class="btn btn-warning" onclick="takePhoto('check_out')">下班打卡</button>
                <button class="btn btn-primary" onclick="openRegisterModal()">注册</button>
            </div>
            <div id="attendanceResult" class="result"></div>
        </div>
    </div>
    
    <!-- 记录区域 - 折叠面板 -->
    <div class="records-container">
        <!-- 打卡记录折叠面板 -->
        <div class="collapse-card">
            <div class="collapse-header" onclick="toggleCollapse(this)">
                <span>📋 打卡记录</span>
                <span class="arrow">▼</span>
            </div>
            <div class="collapse-content">
                <div style="text-align: right; margin-bottom: 10px;">
                    <button class="btn" onclick="loadAllRecords()">刷新</button>
                </div>
                <div class="scrollable">
                    <table class="records-table">
                        <thead><tr><th>姓名</th><th>工号</th><th>时间</th><th>类型</th><th>置信度</th><th>操作</th></tr></thead>
                        <tbody id="recordsBody"><tr><td colspan="6">加载中...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 员工列表折叠面板 -->
        <div class="collapse-card">
            <div class="collapse-header" onclick="toggleCollapse(this)">
                <span>👥 员工列表</span>
                <span class="arrow">▼</span>
            </div>
            <div class="collapse-content">
                <div style="text-align: right; margin-bottom: 10px;">
                    <button class="btn" onclick="loadEmployees()">刷新</button>
                </div>
                <div class="scrollable">
                    <table class="records-table">
                        <thead><tr><th>工号</th><th>姓名</th><th>年龄</th><th>性别</th><th>操作</th></tr></thead>
                        <tbody id="employeesBody"><tr><td colspan="5">加载中...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 注册模态框 -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h3>员工注册</h3>
        <div class="form-group"><label>工号 *</label><input type="text" id="empId" placeholder="请输入工号"></div>
        <div class="form-group"><label>姓名 *</label><input type="text" id="empName" placeholder="请输入姓名"></div>
        <div class="form-group"><label>年龄</label><input type="number" id="age" placeholder="请输入年龄"></div>
        <div class="form-group"><label>性别</label><select id="gender"><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>
        <div id="registerPreview" style="display:none;"><img id="previewImg" style="width:100%; border-radius:10px;"></div>
        <div class="modal-buttons">
            <button class="btn" onclick="captureForRegister()">拍照</button>
            <button class="btn btn-success" onclick="confirmRegister()">确认注册</button>
            <button class="btn" onclick="closeRegisterModal()">取消</button>
        </div>
        <div id="registerResult" class="result"></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let currentPhotoData = null;

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch(e) { alert('无法访问摄像头'); }
    }
    initCamera();

    function capture() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg');
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    function showSuccessPage(name, checkType) {
        const typeText = checkType === 'check_in' ? '上班' : '下班';
        const successDiv = document.createElement('div');
        successDiv.className = 'success-page';
        successDiv.innerHTML = `
            <div class="success-card">
                <div class="check-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg></div>
                <h2>打卡成功</h2>
                <p>${name}</p>
                <button onclick="closeSuccessPage()">返回首页</button>
            </div>
        `;
        document.body.appendChild(successDiv);
        speak(`${name} ${typeText}打卡成功`);
    }

    function closeSuccessPage() {
        const successPage = document.querySelector('.success-page');
        if (successPage) successPage.remove();
        loadAllRecords();
    }

    async function takePhoto(type) {
        const imageData = capture();
        const resultDiv = document.getElementById('attendanceResult');
        resultDiv.className = 'result info';
        resultDiv.style.display = 'block';
        resultDiv.innerText = '识别中...';

        const formData = new FormData();
        formData.append('image_data', imageData);
        formData.append('check_type', type === 'check_out' ? 'check_out' : 'check_in');

        try {
            const res = await fetch('/attendance', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                resultDiv.style.display = 'none';
                showSuccessPage(data.employee.name, type);
            } else {
                resultDiv.className = 'result error';
                resultDiv.innerText = `❌ ${data.message}`;
                speak(data.message);
                setTimeout(() => resultDiv.style.display = 'none', 3000);
            }
        } catch(e) {
            resultDiv.className = 'result error';
            resultDiv.innerText = '网络错误';
        }
    }

    // 折叠面板
    function toggleCollapse(header) {
        const content = header.nextElementSibling;
        header.classList.toggle('collapsed');
        content.classList.toggle('open');
    }

    // 注册模态框
    function openRegisterModal() {
        document.getElementById('registerModal').style.display = 'flex';
        document.getElementById('registerPreview').style.display = 'none';
        document.getElementById('registerResult').style.display = 'none';
        document.getElementById('empId').value = '';
        document.getElementById('empName').value = '';
        document.getElementById('age').value = '';
        document.getElementById('gender').value = '';
        currentPhotoData = null;
    }

    function closeRegisterModal() {
        document.getElementById('registerModal').style.display = 'none';
    }

    function captureForRegister() {
        currentPhotoData = capture();
        const preview = document.getElementById('registerPreview');
        const img = document.getElementById('previewImg');
        img.src = currentPhotoData;
        preview.style.display = 'block';
    }

    async function confirmRegister() {
        const empId = document.getElementById('empId').value.trim();
        const name = document.getElementById('empName').value.trim();
        const age = document.getElementById('age').value;
        const gender = document.getElementById('gender').value;
        
        if (!empId || !name) { alert('请填写工号和姓名'); return; }
        if (!currentPhotoData) { alert('请先拍照'); return; }

        const resultDiv = document.getElementById('registerResult');
        resultDiv.className = 'result info';
        resultDiv.style.display = 'block';
        resultDiv.innerText = '注册中...';

        const formData = new FormData();
        formData.append('emp_id', empId);
        formData.append('name', name);
        formData.append('age', age);
        formData.append('gender', gender);
        formData.append('image_data', currentPhotoData);

        try {
            const res = await fetch('/register', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                resultDiv.className = 'result success';
                resultDiv.innerText = `✅ ${data.message}`;
                speak('注册成功');
                setTimeout(() => {
                    closeRegisterModal();
                    loadEmployees();
                }, 2000);
            } else {
                resultDiv.className = 'result error';
                resultDiv.innerText = `❌ ${data.message}`;
                speak(data.message);
            }
        } catch(e) {
            resultDiv.className = 'result error';
            resultDiv.innerText = '网络错误';
        }
    }

    // 删除打卡记录
    async function deleteAttendance(recordId, name) {
        if (!confirm(`确定要删除 ${name} 的打卡记录吗？`)) return;
        const formData = new FormData();
        formData.append('record_id', recordId);
        try {
            const res = await fetch('/delete_attendance', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
            if (data.success) loadAllRecords();
        } catch(e) { alert('删除失败'); }
    }

    // 删除员工
    async function deleteEmployee(empId, name) {
        if (!confirm(`确定要删除员工 ${name} (工号: ${empId}) 吗？`)) return;
        const formData = new FormData();
        formData.append('emp_id', empId);
        try {
            const res = await fetch('/delete_employee', { method: 'POST', body: formData });
            const data = await res.json();
            alert(data.message);
            if (data.success) {
                loadEmployees();
                loadAllRecords();
            }
        } catch(e) { alert('删除失败'); }
    }

    async function loadAllRecords() {
        try {
            const res = await fetch('/records/all');
            const data = await res.json();
            const tbody = document.getElementById('recordsBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">暂无打卡记录</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.emp_id}</td>
                    <td>${new Date(r.check_time).toLocaleString()}</td>
                    <td>${r.check_type}</td>
                    <td>${r.confidence}</td>
                    <td><button class="btn-small" onclick="deleteAttendance(${r.id}, '${r.name}')">删除记录</button></td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadEmployees() {
        try {
            const res = await fetch('/employees');
            const data = await res.json();
            const tbody = document.getElementById('employeesBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">暂无员工</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(e => `
                <tr>
                    <td>${e.emp_id}</td>
                    <td>${e.name}</td>
                    <td>${e.age || '-'}</td>
                    <td>${e.gender || '-'}</td>
                    <td><button class="btn-small" onclick="deleteEmployee('${e.emp_id}', '${e.name}')">删除员工</button></td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    // 初始打开第一个折叠面板
    document.querySelectorAll('.collapse-content').forEach((el, i) => {
        if (i === 0) el.classList.add('open');
    });

    loadAllRecords();
    loadEmployees();
</script>
</body>
</html>
